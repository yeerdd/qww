<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Code Repository Navigator</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Workspace</p>
          <h1>Code Repository Navigator</h1>
        </div>
        <div class="summary" aria-label="Workspace summary">
          <div>
            <strong id="repoCount">0</strong>
            <span>Repos</span>
          </div>
          <div>
            <strong id="dirtyCount">0</strong>
            <span>Dirty</span>
          </div>
          <div>
            <strong id="todoCount">0</strong>
            <span>Notes</span>
          </div>
        </div>
      </header>

      <section class="controls" aria-label="Filters">
        <label class="search">
          <span>Search repositories</span>
          <input id="searchInput" type="search" placeholder="Name, path, language, branch...">
        </label>
        <label>
          <span>Language</span>
          <select id="languageFilter">
            <option value="all">All languages</option>
          </select>
        </label>
        <label>
          <span>Status</span>
          <select id="statusFilter">
            <option value="all">All statuses</option>
            <option value="dirty">Dirty only</option>
            <option value="clean">Clean only</option>
          </select>
        </label>
      </section>

      <section class="dashboard">
        <aside class="panel">
          <div class="panel-head">
            <h2>Language Mix</h2>
            <span id="scanTime">Not scanned</span>
          </div>
          <div id="languageMix" class="bars"></div>
        </aside>

        <section class="panel repo-panel">
          <div class="panel-head">
            <h2>Repositories</h2>
            <span id="resultCount">0 shown</span>
          </div>
          <div id="repoGrid" class="repo-grid"></div>
          <div id="emptyState" class="empty-state" hidden>
            No repositories match the current filters.
          </div>
        </section>
      </section>
    </main>

    <div id="detailOverlay" class="detail-overlay" hidden></div>
    <aside id="detailDrawer" class="detail-drawer" aria-labelledby="detailTitle" aria-hidden="true">
      <button id="closeDetail" class="icon-button" type="button" aria-label="Close repository details">x</button>
      <div id="detailContent"></div>
    </aside>

    <script src="data/repos.js"></script>
    <script src="app.js"></script>
  </body>
</html>
